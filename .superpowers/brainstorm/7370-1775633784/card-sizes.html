<h2>卡片尺寸规则</h2>
<p class="subtitle">确定卡片的尺寸灵活度</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>固定尺寸档位</h3>
      <p>预设 Small(1x1)、Medium(2x1)、Large(2x2) 三种尺寸，模块开发时选定，用户不可改。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>用户可调整尺寸</h3>
      <p>用户可右键或长按卡片，在小/中/大之间切换尺寸。</p>
    </div>
  </div>
</div>
