# docker-compose.yml
services:
  mysql:
    image: mysql:8.0
    container_name: vibeblog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: vibeblog_root
      MYSQL_DATABASE: vibe_blog
      MYSQL_USER: vibeblog
      MYSQL_PASSWORD: vibeblog123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vibeblog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: vibeblog-server
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=vibeblog
      - DB_PASSWORD=vibeblog123
      - DB_NAME=vibe_blog
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=vibeblog-dev-secret
      - SERVER_PORT=8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: vibeblog-web
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.ts:/app/vite.config.ts
      - ./web/tailwind.config.js:/app/tailwind.config.js
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080

volumes:
  mysql_data:
